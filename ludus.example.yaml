## Ludus Configuration
## Copy this file to ludus.yaml and adjust for your environment.

engine:
  # Path to your Unreal Engine source directory
  sourcePath: "/path/to/UnrealEngine-5.6.1-release"
  # Engine version tag
  version: "5.6.1"
  # Max parallel compile jobs (0 = auto-detect based on available RAM)
  maxJobs: 0
  # Build backend: "native" (default) or "docker"
  # Docker backend builds the engine inside a container, producing a reusable image.
  # backend: "docker"
  # Pre-built engine Docker image URI (e.g. ECR URI). When set, the engine build
  # stage is skipped and game builds use this image directly.
  # dockerImage: "123456789.dkr.ecr.us-east-1.amazonaws.com/ludus-engine:5.6.1"
  # Local Docker image name for engine builds (default: "ludus-engine")
  # dockerImageName: "ludus-engine"
  # Base Docker image for engine builds (default: "ubuntu:22.04")
  # Supports any Debian/Ubuntu (apt-get) or RHEL/Amazon Linux/Fedora (dnf) base.
  # dockerBaseImage: "ubuntu:22.04"

game:
  # projectName is ONLY a convenience label to default the target names below
  # (serverTarget = <projectName>Server, etc.). It does NOT need to match your
  # .uproject filename and is not used for packaged/container paths.
  projectName: "Lyra"
  # Path to the .uproject file — must include the filename, not just the directory.
  # Example: "/home/user/MyGame/MyGame.uproject"
  # This is the source of truth for paths: Unreal names the packaged content
  # directory after the .uproject filename (e.g. a LyraStarterGame6.uproject
  # packages under "LyraStarterGame6/"), and ludus derives the staged/container
  # paths from it — not from projectName. Set this for any non-Lyra project.
  # Leave empty to auto-detect for the Lyra sample from the engine Samples/ dir.
  projectPath: ""
  # Server build target name (default: <projectName>Server, e.g. "LyraServer").
  # Set this explicitly when your target name differs from <projectName>Server
  # (common for real projects, e.g. uproject "LyraStarterGame6" + target "LyraServer").
  serverTarget: ""
  # Client build target name (default: <projectName>Game, e.g. "LyraGame")
  clientTarget: ""
  # Default game target name (default: <projectName>Game, e.g. "LyraGame")
  gameTarget: ""
  # Target platform
  platform: "linux"
  # Target CPU architecture for server builds: "amd64" (default) or "arm64"
  # Use "arm64" to cross-compile for AWS Graviton instances (20-30% cheaper)
  # arch: "arm64"
  # Default server map (L_Expanse bypasses main menu)
  serverMap: "L_Expanse"
  # Content validation settings (optional, Lyra uses built-in checks)
  # contentValidation:
  #   disabled: false
  #   contentMarkerFile: "Content/DefaultGameData.uasset"
  #   pluginContentDirs:
  #     - "ShooterCore"
  #     - "ShooterMaps"

deploy:
  # Deployment target: "gamelift" (default), "stack", "binary", "anywhere", or "ec2"
  target: "gamelift"
  # Output directory for binary export (only used when target is "binary")
  # outputDir: "./dist/server"

container:
  # Docker image name
  imageName: "ludus-server"
  # Docker image tag
  tag: "latest"
  # Game server port
  serverPort: 7777

gamelift:
  # GameLift fleet name
  fleetName: "ludus-fleet"
  # EC2 instance type for the container fleet
  instanceType: "c6i.large"
  # Max concurrent game sessions per instance
  maxConcurrentSessions: 1
  # Container group definition name
  containerGroupName: "ludus-container-group"

# ec2fleet:
#   # S3 bucket for server build uploads (auto-creates "ludus-builds-<account-id>" if empty)
#   s3Bucket: ""
#   # GameLift Server SDK version used by the Game Server Wrapper
#   serverSdkVersion: "5.4.0"

# anywhere:
#   # Custom location name for Anywhere fleet (must start with "custom-")
#   locationName: "custom-ludus-dev"
#   # Local IP address (leave empty to auto-detect)
#   ipAddress: ""
#   # AWS profile for the wrapper's credential provider
#   awsProfile: "default"

aws:
  # AWS region for deployment
  region: "us-east-1"
  # AWS account ID (used for ECR URI)
  accountId: ""
  # ECR repository name
  ecrRepository: "ludus-server"
  # Tags applied to all AWS resources created by Ludus
  tags:
    Project: "my-project"
    Environment: "dev"
    ManagedBy: "ludus"

# ddc:
#   # DDC mode: "zen" (default, Unreal Zen Store), "local" (legacy FileSystem
#   # cache, deprecated), or "none" (disable).
#   # Unreal Engine uses the Zen Store as its default local DDC backend from
#   # UE 5.4 onward (the legacy FileSystem cache is delete-only since 5.4).
#   mode: "zen"
#   # Host path for the Zen Store DDC. For container builds this is mounted into
#   # the container so the cook cache persists across --rm runs. Native/WSL2
#   # builds use UE's own Zen Store in your home dir (this path is not used).
#   # Defaults to ~/.ludus/zen
#   # zenPath: "/home/user/.ludus/zen"
#   # Host path for the legacy FileSystem DDC (mode "local" only).
#   # Defaults to ~/.ludus/ddc
#   # localPath: "/home/user/.ludus/ddc"

# privacy:
#   # Mask the 12-digit AWS account ID in ECR URIs/ARNs in terminal output
#   # (default: true). JSON and MCP output are never masked. Override per-run
#   # with the --show-account-id flag.
#   maskAccountId: true

