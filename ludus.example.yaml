## Ludus Configuration
## Copy this file to ludus.yaml and adjust for your environment.

engine:
  # Path to your Unreal Engine source directory
  sourcePath: "/home/devrecon/Documents/Source/UnrealEngine-5.6.1-release"
  # Engine version tag
  version: "5.6.1"
  # Max parallel compile jobs (0 = auto-detect based on available RAM)
  maxJobs: 0

lyra:
  # Path to Lyra .uproject (leave empty to auto-detect from engine Samples/)
  projectPath: ""
  # Target platform
  platform: "linux"
  # Default server map (L_Expanse bypasses main menu)
  serverMap: "L_Expanse"

container:
  # Docker image name
  imageName: "ludus-lyra-server"
  # Docker image tag
  tag: "latest"
  # Game server port
  serverPort: 7777

gamelift:
  # GameLift fleet name
  fleetName: "ludus-lyra-fleet"
  # EC2 instance type for the container fleet
  instanceType: "c6i.large"
  # Max concurrent game sessions per instance
  maxConcurrentSessions: 1
  # Container group definition name
  containerGroupName: "ludus-lyra-container-group"

aws:
  # AWS region for deployment
  region: "us-east-1"
  # AWS account ID (used for ECR URI)
  accountId: ""
  # ECR repository name
  ecrRepository: "ludus-lyra-server"
