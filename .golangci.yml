linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
    - unconvert
    - gosec

linters-settings:
  gosec:
    excludes:
      - G115 # integer overflow conversion — port numbers and memory math are bounded
      - G204 # subprocess launched with variable — intentional (runner package)
      - G306 # WriteFile 0644 — build config files (INI, XML, props) need to be world-readable

issues:
  exclude-dirs:
    - vendor
